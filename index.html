<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할 일 목록 앱</title>
  <style>
    :root {
      --bg-a: #fff7d6;
      --bg-b: #ffe8a3;
      --card-bg: rgba(255, 255, 255, 0.88);
      --text-main: #1f2937;
      --text-sub: #64748b;
      --accent: #d97706;
      --accent-dark: #b45309;
      --line: #e2e8f0;
      --done: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      position: relative;
      overflow-x: hidden;
      margin: 0;
      min-height: 100vh;
      padding: 28px 16px;
      color: var(--text-main);
      background:
        radial-gradient(circle at 12% 8%, rgba(251, 191, 36, 0.45) 0%, transparent 42%),
        radial-gradient(circle at 88% 4%, rgba(245, 158, 11, 0.38) 0%, transparent 40%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b));
      background-attachment: fixed;
      font-family: "Pretendard", "SUIT", "Noto Sans KR", "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: -1;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      filter: blur(62px);
      opacity: 0.65;
      pointer-events: none;
      animation: floatBlob 10s ease-in-out infinite;
    }

    body::before {
      top: -120px;
      left: -80px;
      background: radial-gradient(circle, #facc15 0%, #f59e0b 55%, transparent 72%);
    }

    body::after {
      right: -120px;
      bottom: -140px;
      background: radial-gradient(circle, #fde047 0%, #fb923c 56%, transparent 74%);
      animation-delay: -4s;
    }

    @keyframes floatBlob {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(28px, -18px) scale(1.1);
      }
    }

    .app-card {
      width: min(640px, 100%);
      margin: 0 auto;
      padding: 24px 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 50px rgba(180, 83, 9, 0.28);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2rem);
      letter-spacing: -0.03em;
      line-height: 1.2;
      font-weight: 800;
      background: linear-gradient(90deg, #78350f, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin: 10px 0 16px;
      font-size: 0.95rem;
      color: var(--text-sub);
      font-weight: 500;
    }

    .input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    #todoInput {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
      background: #fff;
    }

    #todoInput:focus {
      outline: none;
      border-color: #a5b4fc;
      box-shadow: 0 0 0 3px rgba(165, 180, 252, 0.28);
    }

    #addBtn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.95rem;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(90deg, var(--accent), #f59e0b);
    }

    #addBtn:hover {
      background: linear-gradient(90deg, var(--accent-dark), #d97706);
    }

    #priorityInput,
    #dueDateInput,
    #sortSelect {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 10px;
      font-size: 0.92rem;
      background: #fff;
      color: #334155;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .filter-btn,
    #searchInput,
    #clearCompletedBtn,
    #clearAllBtn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: #334155;
      font-size: 0.88rem;
      padding: 8px 10px;
    }

    #searchInput {
      flex: 1;
      min-width: 180px;
    }

    .filter-btn {
      cursor: pointer;
      font-weight: 600;
    }

    .filter-btn.active {
      color: #fff;
      border-color: var(--accent);
      background: linear-gradient(90deg, var(--accent), #f59e0b);
    }

    #clearCompletedBtn {
      cursor: pointer;
      font-weight: 700;
      color: #9f1239;
      border-color: #fecdd3;
      background: #fff1f2;
    }

    #clearAllBtn {
      cursor: pointer;
      font-weight: 700;
      color: #7c2d12;
      border-color: #fed7aa;
      background: #fff7ed;
    }

    #todoCount {
      margin: 0 0 10px;
      color: var(--text-sub);
      font-size: 0.9rem;
      font-weight: 600;
    }

    #progressText {
      margin: 0 0 8px;
      color: var(--text-sub);
      font-size: 0.86rem;
      font-weight: 600;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #f59e0b, #facc15);
      transition: width 0.2s ease;
    }

    .todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid #eef2f7;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--done);
    }

    .todo-main {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .todo-text {
      flex: 1;
      word-break: break-word;
    }

    .todo-meta {
      display: inline-flex;
      gap: 6px;
      margin-right: 6px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #334155;
      background: #e2e8f0;
      white-space: nowrap;
    }

    .tag.high {
      color: #7f1d1d;
      background: #fee2e2;
    }

    .tag.medium {
      color: #854d0e;
      background: #fef9c3;
    }

    .tag.low {
      color: #14532d;
      background: #dcfce7;
    }

    .tag.overdue {
      color: #7f1d1d;
      background: #ffe4e6;
    }

    .edit-input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.93rem;
    }

    .edit-btn {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 8px;
      padding: 5px 9px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .delete-btn {
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #be123c;
      border-radius: 8px;
      padding: 5px 9px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .empty {
      margin: 0;
      padding: 14px;
      text-align: center;
      color: var(--text-sub);
      font-size: 0.92rem;
      background: #fff;
      border: 1px dashed #dbe2ea;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <main class="app-card">
    <h1>할 일 목록</h1>
    <p class="subtitle">오늘 해야 할 일을 빠르게 정리하고 체크해보세요.</p>

    <div class="input-row">
      <input id="todoInput" type="text" placeholder="할 일을 입력하세요" />
      <select id="priorityInput" aria-label="우선순위 선택">
        <option value="high">높음</option>
        <option value="medium" selected>중간</option>
        <option value="low">낮음</option>
      </select>
      <input id="dueDateInput" type="date" aria-label="마감일 선택" />
      <button id="addBtn" type="button">추가</button>
    </div>

    <div class="toolbar">
      <button type="button" class="filter-btn active" data-filter="all">전체</button>
      <button type="button" class="filter-btn" data-filter="active">진행중</button>
      <button type="button" class="filter-btn" data-filter="done">완료</button>
      <input id="searchInput" type="text" placeholder="할 일 검색" />
      <select id="sortSelect" aria-label="정렬 선택">
        <option value="newest">최신순</option>
        <option value="oldest">오래된순</option>
        <option value="priority">우선순위순</option>
        <option value="dueDate">마감임박순</option>
      </select>
      <button id="clearCompletedBtn" type="button">완료 항목 비우기</button>
      <button id="clearAllBtn" type="button">전체 비우기</button>
    </div>

    <p id="todoCount">총 0개</p>
    <p id="progressText">완료율 0%</p>
    <div class="progress-track" aria-hidden="true">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <p id="emptyMessage" class="empty">아직 등록된 할 일이 없습니다.</p>
    <ul id="todoList" class="todo-list" aria-live="polite"></ul>
  </main>
  <script src="script.js"></script>
</body>
</html>
